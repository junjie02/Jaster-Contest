<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaster Attack Tree</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
</head>
<body>
  <div id="header">
    <h1>Jaster Attack Tree</h1>
    <div id="controls">
      <input type="text" id="run-id-input" placeholder="Run ID (e.g. faf7da08eb7a)" value="">
      <button id="load-btn">Load</button>
      <button id="live-btn">Live</button>
    </div>
    <div id="stats">
      <span id="node-count">Nodes: 0</span>
      <span id="edge-count">Edges: 0</span>
      <span id="run-id-display"></span>
    </div>
  </div>
  <div id="graph-container">
    <svg id="graph"></svg>
  </div>
  <div id="tooltip" class="tooltip hidden"></div>

  <script>
    const STATUS_COLORS = {
      unexplored: "#9ca3af",
      exploring: "#f59e0b",
      success: "#22c55e",
      failed: "#ef4444"
    };

    const KIND_SHAPES = {
      target: "star",
      asset: "rect",
      entry: "circle",
      weakness: "diamond",
      technique: "rect",
      hypothesis: "hexagon"
    };

    let treeData = null;
    let eventSource = null;
    let currentTransform = d3.zoomIdentity;
    const svg = d3.select("#graph");
    const container = document.getElementById("graph-container");
    const zoom = d3.zoom()
      .scaleExtent([0.3, 2.5])
      .on("zoom", (event) => {
        currentTransform = event.transform;
        svg.select(".viewport").attr("transform", currentTransform);
      });

    function renderTree(data) {
      if (!data || !data.nodes || data.nodes.length === 0) return;

      treeData = data;

      const width = container.clientWidth;
      const height = Math.max(600, container.clientHeight || 600);

      svg.attr("width", width).attr("height", height);

      const nodes = data.nodes.map(n => ({ ...n, id: n.key }));
      const edges = Array.isArray(data.edges) ? data.edges : [];
      const stratify = d3.stratify()
        .id(d => d.id)
        .parentId(d => d.parent_key || null);

      let root;
      try {
        root = stratify(nodes);
      } catch (e) {
        console.error("Tree stratification failed:", e);
        return;
      }

      const layoutRoot = d3.tree()
        .nodeSize([80, 220])(root);
      const descendants = layoutRoot.descendants();
      const links = layoutRoot.links();
      const minX = d3.min(descendants, d => d.x) ?? 0;
      const maxX = d3.max(descendants, d => d.x) ?? 0;
      const minY = d3.min(descendants, d => d.y) ?? 0;
      const maxY = d3.max(descendants, d => d.y) ?? 0;
      const graphWidth = Math.max(1, maxY - minY + 160);
      const graphHeight = Math.max(1, maxX - minX + 160);
      const offsetX = (width - graphWidth) / 2 - minY + 80;
      const offsetY = (height - graphHeight) / 2 - minX + 80;
      const nodeRadius = d => Math.max(4, Math.min(20, (d.data.priority || 0) / 10));

      svg.selectAll("*").remove();
      svg.call(zoom);

      const viewport = svg.append("g")
        .attr("class", "viewport");

      const g = viewport.append("g")
        .attr("transform", `translate(${offsetX}, ${offsetY})`);

      const linkGen = d3.linkHorizontal()
        .x(d => d.y)
        .y(d => d.x);

      g.append("g")
        .attr("class", "edges")
        .selectAll("path")
        .data(links)
        .enter()
        .append("path")
        .attr("d", linkGen)
        .attr("fill", "none")
        .attr("stroke", "#6b7280")
        .attr("stroke-width", 1.5)
        .attr("stroke-opacity", 0.6);

      const nodeGroups = g.append("g")
        .attr("class", "nodes")
        .selectAll("g")
        .data(descendants)
        .enter()
        .append("g")
        .attr("transform", d => `translate(${d.y}, ${d.x})`)
        .style("cursor", "pointer")
        .on("mouseenter", (event, d) => showTooltip(event, d.data))
        .on("mouseleave", () => hideTooltip());

      nodeGroups.each(function(d) {
        const shape = KIND_SHAPES[d.data.kind] || "circle";
        const r = nodeRadius(d);
        const color = STATUS_COLORS[d.data.status] || STATUS_COLORS.unexplored;

        const el = d3.select(this);
        if (shape === "circle") {
          el.append("circle").attr("r", r).attr("fill", color).attr("stroke", "#fff").attr("stroke-width", 2);
        } else if (shape === "rect") {
          el.append("rect").attr("x", -r).attr("y", -r * 0.7).attr("width", r * 2).attr("height", r * 1.4)
            .attr("rx", 3).attr("fill", color).attr("stroke", "#fff").attr("stroke-width", 2);
        } else if (shape === "diamond") {
          el.append("polygon")
            .attr("points", `0,${-r} ${r},0 0,${r} ${-r},0`)
            .attr("fill", color).attr("stroke", "#fff").attr("stroke-width", 2);
        } else if (shape === "star") {
          const points = d3.range(5).map(i => {
            const angle = (i * 4 * Math.PI) / 10 - Math.PI / 2;
            const radius = i % 2 === 0 ? r : r / 2;
            return `${Math.cos(angle) * radius},${Math.sin(angle) * radius}`;
          });
          el.append("polygon").attr("points", points.join(" "))
            .attr("fill", color).attr("stroke", "#fff").attr("stroke-width", 2);
        } else if (shape === "hexagon") {
          const hx = r * Math.cos(Math.PI / 6);
          el.append("polygon")
            .attr("points", `${hx},${-r} ${hx},${r} 0,${r * 0.6} ${-hx},${r} ${-hx},${-r} 0,${-r * 0.6}`)
            .attr("fill", color).attr("stroke", "#fff").attr("stroke-width", 2);
        }

        el.append("text")
          .attr("dy", r + 14)
          .attr("text-anchor", "middle")
          .attr("font-size", "11px")
          .attr("fill", "#e5e7eb")
          .text(d.data.title.length > 20 ? d.data.title.slice(0, 18) + "…" : d.data.title);
      });

      document.getElementById("node-count").textContent = `Nodes: ${nodes.length}`;
      document.getElementById("edge-count").textContent = `Edges: ${edges.length}`;
      svg.call(zoom.transform, currentTransform);
    }

    function showTooltip(event, node) {
      const tooltip = document.getElementById("tooltip");
      const fields = [
        ["key", node.key],
        ["kind", node.kind],
        ["status", node.status],
        ["priority", node.priority],
        ["locator", node.locator],
        ["value", node.value],
        ["reason", node.reason],
        ["how", node.how],
        ["evidence", Array.isArray(node.evidence) ? node.evidence.join("\n") : node.evidence]
      ].filter(([, v]) => v);

      tooltip.innerHTML = fields.map(([k, v]) => `<div class="tip-row"><span class="tip-key">${k}:</span> <span class="tip-val">${v}</span></div>`).join("");
      tooltip.classList.remove("hidden");

      const rect = container.getBoundingClientRect();
      let x = event.clientX - rect.left + 15;
      let y = event.clientY - rect.top + 15;
      if (x + 300 > rect.width) x = event.clientX - rect.left - 315;
      if (y + 200 > rect.height) y = event.clientY - rect.top - 215;
      tooltip.style.left = x + "px";
      tooltip.style.top = y + "px";
    }

    function hideTooltip() {
      document.getElementById("tooltip").classList.add("hidden");
    }

    function connectSSE() {
      if (eventSource) {
        eventSource.close();
      }
      fetch("/current")
        .then(r => (r.ok ? r.json() : null))
        .then(data => {
          if (data && data.nodes && data.nodes.length) {
            renderTree(data);
            document.getElementById("run-id-display").textContent = "🔴 LIVE";
          }
        })
        .catch(() => {});
      eventSource = new EventSource("/events");
      eventSource.addEventListener("tree_update", (e) => {
        try {
          const data = JSON.parse(e.data);
          renderTree(data);
          document.getElementById("run-id-display").textContent = "🔴 LIVE";
        } catch (err) {
          console.error("Failed to parse tree update:", err);
        }
      });
      eventSource.onerror = () => {};
    }

    function loadRun(runId) {
      if (!runId) return;
      fetch(`/run/${runId}/tree`)
        .then(r => {
          if (!r.ok) throw new Error("not found");
          return r.json();
        })
        .then(data => {
          renderTree(data);
          document.getElementById("run-id-display").textContent = `Run: ${runId}`;
        })
        .catch(() => {
          alert("Run not found: " + runId);
        });
    }

    function loadLatestRun() {
      return fetch("/latest_run")
        .then(r => (r.ok ? r.json() : null))
        .then(payload => {
          const runId = payload && payload.run_id ? String(payload.run_id).trim() : "";
          if (!runId) return false;
          document.getElementById("run-id-input").value = runId;
          loadRun(runId);
          return true;
        })
        .catch(() => false);
    }

    document.getElementById("load-btn").addEventListener("click", () => {
      const runId = document.getElementById("run-id-input").value.trim();
      if (eventSource) {
        eventSource.close();
        eventSource = null;
      }
      loadRun(runId);
    });

    document.getElementById("run-id-input").addEventListener("keydown", (e) => {
      if (e.key === "Enter") {
        document.getElementById("load-btn").click();
      }
    });

    document.getElementById("live-btn").addEventListener("click", () => {
      connectSSE();
    });

    // Auto-load latest run on page load, otherwise fall back to live mode.
    loadLatestRun().then(found => {
      if (!found) {
        connectSSE();
      }
    });

    window.addEventListener("resize", () => {
      if (treeData) renderTree(treeData);
    });
  </script>
</body>
</html>
