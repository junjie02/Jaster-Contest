<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jaster Attack Tree</title>
  <link rel="stylesheet" href="style.css">
  <script src="app.js" defer></script>
</head>
<body>
  <div id="header">
    <h1>Jaster Attack Tree</h1>
    <div id="controls">
      <input type="text" id="run-id-input" placeholder="Run ID (e.g. faf7da08eb7a)" value="">
      <button id="load-btn">Load</button>
      <button id="live-btn">Live</button>
    </div>
    <div id="stats">
      <span id="node-count">Nodes: 0</span>
      <span id="edge-count">Edges: 0</span>
      <span id="run-id-display"></span>
    </div>
  </div>
  <div id="graph-container">
    <div id="graph-state" class="graph-state">Loading latest run...</div>
    <svg id="graph"></svg>
  </div>
  <div id="tooltip" class="tooltip hidden"></div>
</body>
</html>
